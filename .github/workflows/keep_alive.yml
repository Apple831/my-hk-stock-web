name: Keep Streamlit Awake

on:
  schedule:
    # 每 6 小時 ping 一次（遠低於 12 小時睡眠門檻）
    # UTC 時間：0, 6, 12, 18 點 = 港澳時間 8, 14, 20, 02 點
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: # 允許手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          echo "Pinging app at $(date)"
          curl -s -o /dev/null -w "HTTP Status: %{http_code}" \
            https://my-hk-stock-web.streamlit.app/
          echo ""
          echo "Done"
