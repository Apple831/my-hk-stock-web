name: Keep Streamlit Awake (Playwright)

on:
  schedule:
    # 每 6 小時執行一次，遠低於 12 小時睡眠門檻
    # UTC: 0, 6, 12, 18 = 港澳時間 8, 14, 20, 2 點
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Wake up Streamlit app
        run: |
          python - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          # ← 把這裏換成你的實際 URL
          APP_URL = "https://my-hk-stock-web.streamlit.app/"

          async def wake():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  page = await browser.new_page()

                  print(f"Opening {APP_URL} ...")
                  await page.goto(APP_URL, timeout=60000)

                  # 如果睡眠，Streamlit 會顯示 "Yes, get this app back up!" 按鈕
                  try:
                      btn = page.get_by_role("button", name="Yes, get this app back up!")
                      await btn.wait_for(timeout=6000)
                      print("App was sleeping — clicking wake button...")
                      await btn.click()
                      await page.wait_for_load_state("networkidle", timeout=60000)
                      print("App woken up!")
                  except Exception:
                      print("App was already awake.")

                  # 等 WebSocket 連線穩定
                  await page.wait_for_timeout(5000)
                  print(f"Done. Page title: {await page.title()}")
                  await browser.close()

          asyncio.run(wake())
          EOF
